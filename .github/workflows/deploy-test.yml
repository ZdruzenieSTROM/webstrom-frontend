name: Deploy Test Environment

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      repository: ${{ steps.prep.outputs.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare repository name
        id: prep
        run: |
          # Convert repository name to lowercase for Docker compatibility
          echo "repository=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image tag
        id: export-tag
        run: |
          # Get the first tag from the metadata output
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | head -n1)
          echo "image=$FIRST_TAG" >> $GITHUB_OUTPUT
          echo "Exported image: $FIRST_TAG"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Setup deployment directory
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: server.strom.sk
          username: webstrom
          key: ${{ secrets.WEBSTROM_DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            set -e  # Exit on any error

            # Create deployment directory
            mkdir -p ~/webstrom-test

            # Login to GitHub Container Registry on the server
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin || { echo "Failed to login to registry"; exit 1; }

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: server.strom.sk
          username: webstrom
          key: ${{ secrets.WEBSTROM_DEPLOY_SSH_PRIVATE_KEY }}
          source: 'compose-test.yaml'
          target: '~/webstrom-test/'
          strip_components: 0 # Keep the file structure
          overwrite: true # Overwrite existing files

      - name: Deploy application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: server.strom.sk
          username: webstrom
          key: ${{ secrets.WEBSTROM_DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            set -e  # Exit on any error

            cd ~/webstrom-test

                                    # Create .env file with deployment configuration
            # Get the repository and tag from the build job outputs
            REPO_LOWER='${{ needs.build.outputs.repository }}'
            # Get the first tag (which includes the branch and short SHA)
            FULL_IMAGE_TAG=$(echo '${{ needs.build.outputs.tags }}' | head -n1)
            # Extract just the tag part after the repository name
            IMAGE_TAG=$(echo "$FULL_IMAGE_TAG" | sed "s|ghcr.io/$REPO_LOWER:||")

            echo "Repository: $REPO_LOWER"
            echo "Image tag: $IMAGE_TAG"
            echo "Full image: ghcr.io/$REPO_LOWER:$IMAGE_TAG"

            cat > .env << EOF
            GITHUB_REPOSITORY=$REPO_LOWER
            IMAGE_TAG=$IMAGE_TAG
            EOF

            # Log in to GitHub Container Registry (in case previous login expired)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images and restart services using our specific compose file
            docker compose -f compose-test.yaml pull || { echo "Failed to pull images"; exit 1; }
            docker compose -f compose-test.yaml up -d --force-recreate || { echo "Failed to start containers"; exit 1; }

            # Clean up old images
            docker image prune -f

            echo "Deployment completed successfully!"
