name: Deploy Test Environment

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Setup deployment directory
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: server.strom.sk
          username: webstrom
          key: ${{ secrets.WEBSTROM_DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            # Create deployment directory
            mkdir -p ~/webstrom-test

            # Login to GitHub Container Registry on the server
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: server.strom.sk
          username: webstrom
          key: ${{ secrets.WEBSTROM_DEPLOY_SSH_PRIVATE_KEY }}
          source: 'compose-test.yaml'
          target: '~/webstrom-test/'

      - name: Deploy application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: server.strom.sk
          username: webstrom
          key: ${{ secrets.WEBSTROM_DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            cd ~/webstrom-test

            # Set environment variables for the compose file
            export GITHUB_REPOSITORY="${{ github.repository }}"
            export IMAGE_TAG="${{ github.ref_name }}-${{ github.sha }}"

            # Pull latest images and restart services using our specific compose file
            docker compose -f compose-test.yaml pull
            docker compose -f compose-test.yaml up -d --force-recreate

            # Clean up old images
            docker image prune -f
